name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键: 用 setup-python 安装 3.11，后续 pip/buildozer 全用这个 Python
      # 这样 p4a 的 hostpython3 = 3.11，与 requirements python3==3.11.0 匹配
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev

      # 关键: 用 "python -m pip" 而非 "pip3"，确保装到 3.11 下
      - name: Install buildozer & cython (Python 3.11)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer" "cython==0.29.37"
          python -m buildozer --version
          python --version

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-ndk23b-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-ndk23b-

      # 关键: 用 "python -m buildozer" 而非 "buildozer"，
      # 确保 python-for-android 运行在 Python 3.11 下
      - name: Build APK
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Host Python: $(python --version)"
          echo "JAVA: $(java -version 2>&1 | head -1)"
          yes | python -m buildozer android debug 2>&1 | tee build.log
          echo "=== bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ 为空"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
