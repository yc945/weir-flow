name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── 主方案: Docker 构建 ─────────────────────────────────────────────────────
  build-docker:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer Docker build dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: docker-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            docker-buildozer-${{ runner.os }}-

      - name: Prepare workspace permissions
        run: |
          mkdir -p bin
          chmod -R 777 .

      - name: Build APK with kivy/buildozer Docker
        # Mounts .github/docker_build.sh into container; the script auto-detects
        # Docker's Python version, patches p4a recipe to match, then runs buildozer.
        run: |
          docker run --rm \
            -v "$(pwd)":/home/user/hostcwd \
            -v "$(pwd)/.github/docker_build.sh":/docker_build.sh \
            --entrypoint bash \
            ghcr.io/kivy/buildozer:latest \
            /docker_build.sh 2>&1 | tee build.log
          DOCKER_RC=${PIPESTATUS[0]}
          echo "=== docker exit: $DOCKER_RC ==="
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"
          [ $DOCKER_RC -eq 0 ]

      - name: Show build log tail (always)
        if: always()
        run: |
          echo "=== Last 200 lines of build.log ==="
          tail -n 200 build.log 2>/dev/null || echo "(no build.log)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-docker
          path: build.log

  # ── 备用方案: 原生构建 ─────────────────────────────────────────────────────
  build-native:
    name: Build APK (Native fallback)
    runs-on: ubuntu-22.04
    needs: build-docker
    if: failure()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev

      - name: Install buildozer & cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer" "cython==0.29.37"

      - name: Override system python3 and patch p4a recipe to match host Python
        run: |
          # Make system python3 point to setup-python's Python 3.11.x
          PYTHON311=$(python -c "import sys; print(sys.executable)")
          sudo ln -sf "$PYTHON311" /usr/bin/python3
          sudo ln -sf "$PYTHON311" /usr/local/bin/python3
          echo "python3 → $(python3 --version)"

          # Detect exact Python version and patch p4a python3 recipe to match.
          # This avoids the "python3 should have same version as hostpython3" error
          # that fires when recipe version != platform.python_version().
          PYTHON_VER=$(python -c "import platform; print(platform.python_version())")
          echo "Patching p4a Python3 recipe to version $PYTHON_VER"

          P4A_RECIPE=$(python -c "
          import pythonforandroid, os
          print(os.path.join(os.path.dirname(pythonforandroid.__file__), 'recipes', 'python3', '__init__.py'))
          ")
          echo "Recipe path: $P4A_RECIPE"
          echo "Before patch: $(grep \"version = '\" $P4A_RECIPE | head -3)"
          sed -i "s/version = '[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*'/version = '$PYTHON_VER'/" "$P4A_RECIPE"
          echo "After patch:  $(grep \"version = '\" $P4A_RECIPE | head -3)"

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: native-buildozer-${{ runner.os }}-ndk23b-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            native-buildozer-${{ runner.os }}-ndk23b-

      - name: Build APK (python -m buildozer)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Host python  : $(python --version)"
          echo "System python3: $(python3 --version)"
          # Use yes | for stdin prompts; PIPESTATUS[1] captures buildozer's exit code
          # (avoids set -o pipefail which misreports when 'yes' gets SIGPIPE on success)
          yes | python -m buildozer android debug 2>&1 | tee build.log
          BUILDOZER_RC=${PIPESTATUS[1]}
          echo "=== buildozer exit: $BUILDOZER_RC ==="
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"
          [ $BUILDOZER_RC -eq 0 ]
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Show build log tail (always)
        if: always()
        run: |
          echo "=== Last 200 lines of build.log ==="
          tail -n 200 build.log 2>/dev/null || echo "(no build.log)"

      - name: Upload APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk-fallback
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-native
          path: build.log
