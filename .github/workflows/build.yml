name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip wget curl \
            build-essential autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libffi-dev libssl-dev cmake

      - name: Install Python build tools
        run: |
          pip install --upgrade pip wheel setuptools
          pip install cython==0.29.33
          pip install buildozer==1.5.0

      - name: Cache buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Accept Android SDK licenses
        run: |
          mkdir -p ~/.android
          touch ~/.android/repositories.cfg
          find ~/.buildozer -name "sdkmanager" 2>/dev/null | head -1 | \
            xargs -I{} sh -c 'yes | {} --licenses' 2>/dev/null || true

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          buildozer android debug 2>&1 | tee build.log

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "堰流过流计算 v${{ github.run_number }}"
          files: bin/*.apk
          body: |
            ## 溢流堰不规则断面过流能力计算 APK

            **功能**：计算溢流堰堰顶不规则断面的过流能力（Q）
            - 基于梯形积分法，逐段叠加各控制断面的单宽流量
            - 参考规范：SL 253-2018、SL 265-2016、水力计算手册（第二版）
            - 支持自定义控制点数量、堰顶高程、段宽
            - 支持导入/导出 CSV

            **安装**：下载 .apk 文件，在 Android 手机上允许安装未知来源应用后安装。
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
