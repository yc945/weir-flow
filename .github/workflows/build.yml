name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── 主方案: Docker 构建（kivy 官方镜像，环境完全隔离）────────────────────────
  build-docker:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer Docker build dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: docker-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            docker-buildozer-${{ runner.os }}-

      - name: Prepare workspace (fix permissions for Docker uid)
        run: |
          mkdir -p bin
          chmod -R 777 .

      - name: Build APK with kivy/buildozer Docker
        run: |
          set -o pipefail
          docker run --rm \
            -v "$(pwd)":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1 | tee build.log
          echo "=== bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"

      - name: Show build log tail (always)
        if: always()
        run: |
          echo "=== Last 200 lines of build.log ==="
          tail -n 200 build.log 2>/dev/null || echo "(no build.log found)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-docker
          path: build.log

  # ── 备用方案: 原生构建（精确 Python 3.11.0，匹配 p4a recipe）────────────────
  build-native:
    name: Build APK (Native fallback)
    runs-on: ubuntu-22.04
    needs: build-docker
    if: failure()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11.0 (exact, matches p4a python3 recipe)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11.0'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev

      - name: Install buildozer & cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer" "cython==0.29.37"

      - name: Override system python3 → Python 3.11.0
        run: |
          PYTHON311=$(python -c "import sys; print(sys.executable)")
          echo "Python executable: $PYTHON311"
          python --version
          sudo ln -sf "$PYTHON311" /usr/bin/python3
          sudo ln -sf "$PYTHON311" /usr/local/bin/python3
          echo "python3 now points to: $(python3 --version)"

      - name: Show p4a python3 recipe version
        run: |
          python -c "
          import importlib.util, os
          try:
              import pythonforandroid
              recipe_dir = os.path.join(os.path.dirname(pythonforandroid.__file__), 'recipes', 'python3')
              init_file = os.path.join(recipe_dir, '__init__.py')
              with open(init_file) as f:
                  for line in f:
                      if 'version' in line.lower() and '=' in line:
                          print('p4a python3 recipe:', line.strip())
                          break
          except Exception as e:
              print('Could not read p4a recipe:', e)
          "

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: native-buildozer-${{ runner.os }}-ndk23b-py3110-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            native-buildozer-${{ runner.os }}-ndk23b-py3110-
            native-buildozer-${{ runner.os }}-ndk23b-

      - name: Build APK (python -m buildozer)
        run: |
          set -o pipefail
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Host python  : $(python --version)"
          echo "System python3: $(python3 --version)"
          python -m buildozer android debug 2>&1 | tee build.log
          echo "=== bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Show build log tail (always)
        if: always()
        run: |
          echo "=== Last 200 lines of build.log ==="
          tail -n 200 build.log 2>/dev/null || echo "(no build.log found)"

      - name: Upload APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk-fallback
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-native
          path: build.log
