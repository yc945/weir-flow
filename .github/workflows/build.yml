name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── 主方案: Docker 构建（kivy 官方镜像，环境完全隔离）────────────────────────
  build-docker:
    name: Build APK (Docker)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache buildozer Docker build dir
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: docker-buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            docker-buildozer-${{ runner.os }}-

      - name: Build APK with kivy/buildozer Docker
        run: |
          # kivy 官方 buildozer 镜像：Python 3.11 + NDK + 所有依赖均已配置好
          docker run --rm \
            -v "$(pwd)":/home/user/hostcwd \
            ghcr.io/kivy/buildozer:latest \
            android debug 2>&1 | tee build.log
          echo "=== bin/ ==="
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-docker
          path: build.log

  # ── 备用方案: 原生构建（修复 python3 symlink + NDK 23b）─────────────────────
  build-native:
    name: Build APK (Native fallback)
    runs-on: ubuntu-22.04
    # 仅在 Docker 方案失败时才运行，节省 CI 时间
    needs: build-docker
    if: failure()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            build-essential libsqlite3-dev

      - name: Install buildozer & cython (under Python 3.11)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "buildozer" "cython==0.29.37"

      # 关键修复：让系统 python3 命令指向 3.11，
      # 使 p4a 的 hostpython3 版本检测返回 3.11.x
      - name: Override system python3 to Python 3.11
        run: |
          PYTHON311=$(python -c "import sys; print(sys.executable)")
          echo "Overriding python3 -> $PYTHON311"
          sudo ln -sf "$PYTHON311" /usr/bin/python3
          sudo ln -sf "$PYTHON311" /usr/local/bin/python3
          python3 --version

      - name: Cache buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: native-buildozer-${{ runner.os }}-ndk23b-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            native-buildozer-${{ runner.os }}-ndk23b-

      - name: Build APK (python -m buildozer)
        run: |
          export JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64
          export PATH=$JAVA_HOME/bin:$PATH
          echo "Host python: $(python --version)"
          echo "System python3: $(python3 --version)"
          yes | python -m buildozer android debug 2>&1 | tee build.log
          ls -lh bin/ 2>/dev/null || echo "(bin/ 为空)"
        env:
          JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64

      - name: Upload APK (fallback)
        uses: actions/upload-artifact@v4
        with:
          name: weir-flow-debug-apk-fallback
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-native
          path: build.log
